name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages base path
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const repo = process.env.GITHUB_REPOSITORY || '';
          const [owner, name] = repo.split('/');
          const base = owner && name && name !== `${owner}.github.io` ? `/${name}/` : '/';
          const site = owner ? `https://${owner}.github.io` : 'https://digiclara.example';
          const file = 'src/config.yaml';
          let yaml = fs.readFileSync(file, 'utf8');
          yaml = yaml.replace(/site:\n  name: ([^\n]+)\n  site: '[^']+'\n  base: '[^']+'/m, `site:\n  name: $1\n  site: '${site}'\n  base: '${base}'`);
          fs.writeFileSync(file, yaml);
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Validate site
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Validate built links
        run: npm run validate:links

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
