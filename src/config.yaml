site:
  name: DigiClara
  site: 'https://digiclara.example'
  base: '/'
  trailingSlash: true

metadata:
  title:
    default: DigiClara
    template: '%s | DigiClara'
  description: 'Blog independiente con guias, comparativas y recursos para elegir software, proteger dispositivos y mejorar la privacidad digital.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: DigiClara
    images:
      - url: '/assets/digiclara-og.svg'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@digiclara'
    site: '@digiclara'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

contact:
  email: ''

editorial:
  affiliateEnabled: false
  newsletterEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
